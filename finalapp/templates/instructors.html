{% load static %}


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">

    <title>School Management System</title>
    <style>
        /* ---------- BASIC STYLING ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            font-weight: 500;
            color: #495057;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }
        .tab-btn:hover { color: #667eea; background: #f1f3f5; }
        .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
        .content { padding: 30px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ---------- FORMS ---------- */
        .form-section { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #333; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-row textarea { grid-column: 1 / -1; }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-danger { background: #dc3545; color: white; padding: 5px 10px; font-size: 0.9em; }
        .btn-danger:hover { background: #c82333; }
        .btn-success { background: #28a745; color: white; padding: 5px 10px; font-size: 0.9em; }
        .btn-success:hover { background: #218838; }

        /* ---------- TABLE ---------- */
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        .table td { padding: 12px; border-bottom: 1px solid #e9ecef; }
        .table tr:hover { background: #f8f9fa; }

        /* ---------- ALERTS ---------- */
        .alert { padding: 15px; border-radius: 5px; margin-bottom: 20px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* ---------- EMPTY / LOADING ---------- */
        .empty-state { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 20px; color: #667eea; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 School Management System</h1>
        <p>Manage Instructors, Courses, and Students</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('instructors', event)">👨‍🏫 Instructors</button>
        <button class="tab-btn" onclick="switchTab('courses', event)">📖 Courses</button>
        <button class="tab-btn" onclick="switchTab('students', event)">👨‍🎓 Students</button>
    </div>

    <div class="content">

        <!-- INSTRUCTORS TAB -->
        <div id="instructors" class="tab-content active">
            <div id="instructorAlert"></div>
            <div class="form-section">
                <h2>➕ Add New Instructor</h2>
                <form id="instructorForm" onsubmit="createInstructor(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="inst_name">Name</label>
                            <input type="text" id="inst_name" required>
                        </div>
                        <div class="form-group">
                            <label for="inst_email">Email</label>
                            <input type="email" id="inst_email" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="inst_dept">Department</label>
                            <input type="text" id="inst_dept" required>
                        </div>
                        <div class="form-group">
                            <label for="inst_qual">Qualification</label>
                            <input type="text" id="inst_qual" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Add Instructor</button>
                </form>
            </div>
            <h2>📋 All Instructors</h2>
            <div id="instructorsList"></div>
        </div>

        <!-- COURSES TAB -->
        <div id="courses" class="tab-content">
            <div id="courseAlert"></div>
            <div class="form-section">
                <h2>➕ Add New Course</h2>
                <form id="courseForm" onsubmit="createCourse(event)">
                    <div class="form-group">
                        <label for="course_title">Course Title</label>
                        <input type="text" id="course_title" required>
                    </div>
                    <div class="form-group">
                        <label for="course_desc">Description</label>
                        <textarea id="course_desc" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="course_inst">Instructor</label>
                        <select id="course_inst" required>
                            <option value="">Select an Instructor</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Add Course</button>
                </form>
            </div>
            <h2>📋 All Courses</h2>
            <div id="coursesList"></div>
        </div>

        <!-- STUDENTS TAB -->
        <div id="students" class="tab-content">
            <div id="studentAlert"></div>
            <div class="form-section">
                <h2>➕ Add New Student</h2>
                <form id="studentForm" onsubmit="createStudent(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="student_name">Name</label>
                            <input type="text" id="student_name" required>
                        </div>
                        <div class="form-group">
                            <label for="student_email">Email</label>
                            <input type="email" id="student_email" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="student_enroll">Enrollment Number</label>
                            <input type="text" id="student_enroll" required>
                        </div>
                        <div class="form-group">
                            <label for="student_course">Course</label>
                            <select id="student_course" required>
                                <option value="">Select a Course</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">Add Student</button>
                </form>
            </div>
            <h2>📋 All Students</h2>
            <div id="studentsList"></div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://127.0.0.1:8000';

    // ----- TAB SWITCHING -----
    function switchTab(tabName, evt) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');

        if (tabName === 'instructors') loadInstructors();
        else if (tabName === 'courses') loadCourses();
        else if (tabName === 'students') loadStudents();
    }

    // ----- ALERT -----
    function showAlert(containerId, message, type) {
        const alertDiv = document.getElementById(containerId);
        alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        setTimeout(() => { alertDiv.innerHTML = ''; }, 3000);
    }

    // ===== INSTRUCTORS =====
    function loadInstructors() {
        const container = document.getElementById('instructorsList');
        container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

        fetch(`${API_BASE}/instructors/`)
        .then(res => res.json())
        .then(data => {
            const instructors = data.results || data;
            if (!instructors.length) {
                container.innerHTML = '<div class="empty-state">No instructors found. Add one above!</div>';
                return;
            }
            let html = '<table class="table"><thead><tr><th>Name</th><th>Email</th><th>Department</th><th>Qualification</th><th>Action</th></tr></thead><tbody>';
            instructors.forEach(inst => {
                html += `<tr>
                    <td>${inst.name}</td>
                    <td>${inst.email}</td>
                    <td>${inst.department}</td>
                    <td>${inst.qualification}</td>
                    <td><button class="btn-danger" onclick="deleteInstructor(${inst.id})">Delete</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;

            // Update course instructor dropdown
            const courseInst = document.getElementById('course_inst');
            courseInst.innerHTML = '<option value="">Select an Instructor</option>';
            instructors.forEach(inst => {
                courseInst.innerHTML += `<option value="${inst.id}">${inst.name}</option>`;
            });
        })
        .catch(err => container.innerHTML = '<div class="empty-state">Error loading instructors</div>');
    }

    function createInstructor(event) {
        event.preventDefault();
        const data = {
            name: document.getElementById('inst_name').value,
            email: document.getElementById('inst_email').value,
            department: document.getElementById('inst_dept').value,
            qualification: document.getElementById('inst_qual').value
        };
        fetch(`${API_BASE}/instructors/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('instructorForm').reset();
            showAlert('instructorAlert', 'Instructor added successfully!', 'success');
            loadInstructors();
        })
        .catch(err => showAlert('instructorAlert', 'Error adding instructor', 'error'));
    }

    function deleteInstructor(id) {
        if (!confirm('Are you sure you want to delete this instructor?')) return;
        fetch(`${API_BASE}/instructors/${id}/`, { method: 'DELETE' })
        .then(() => { showAlert('instructorAlert', 'Instructor deleted successfully!', 'success'); loadInstructors(); })
        .catch(() => showAlert('instructorAlert', 'Error deleting instructor', 'error'));
    }

    // ===== COURSES =====
    function loadCourses() {
        const container = document.getElementById('coursesList');
        container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

        fetch(`${API_BASE}/courses/`)
        .then(res => res.json())
        .then(data => {
            const courses = data.results || data;
            if (!courses.length) { container.innerHTML = '<div class="empty-state">No courses found. Add one above!</div>'; return; }

            let html = '<table class="table"><thead><tr><th>Title</th><th>Description</th><th>Instructor</th><th>Action</th></tr></thead><tbody>';
            courses.forEach(course => {
                const instName = course.instructor ? course.instructor.name : 'N/A';
                html += `<tr>
                    <td>${course.title}</td>
                    <td>${course.description.substring(0,50)}...</td>
                    <td>${instName}</td>
                    <td><button class="btn-danger" onclick="deleteCourse(${course.id})">Delete</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;

            // Update student course dropdown
            const studentCourse = document.getElementById('student_course');
            studentCourse.innerHTML = '<option value="">Select a Course</option>';
            courses.forEach(course => { studentCourse.innerHTML += `<option value="${course.id}">${course.title}</option>`; });
        })
        .catch(err => container.innerHTML = '<div class="empty-state">Error loading courses</div>');
    }

    function createCourse(event) {
        event.preventDefault();
        const data = {
            title: document.getElementById('course_title').value,
            description: document.getElementById('course_desc').value,
            Instructor: parseInt(document.getElementById('course_inst').value)
        };
        fetch(`${API_BASE}/courses/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('courseForm').reset();
            showAlert('courseAlert', 'Course added successfully!', 'success');
            loadCourses();
        })
        .catch(err => showAlert('courseAlert', 'Error adding course', 'error'));
    }

    function deleteCourse(id) {
        if (!confirm('Are you sure you want to delete this course?')) return;
        fetch(`${API_BASE}/courses/${id}/`, { method: 'DELETE' })
        .then(() => { showAlert('courseAlert', 'Course deleted successfully!', 'success'); loadCourses(); })
        .catch(() => showAlert('courseAlert', 'Error deleting course', 'error'));
    }

    // ===== STUDENTS =====
    function loadStudents() {
        const container = document.getElementById('studentsList');
        container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

        fetch(`${API_BASE}/students/`)
        .then(res => res.json())
        .then(data => {
            const students = data.results || data;
            if (!students.length) { container.innerHTML = '<div class="empty-state">No students found. Add one above!</div>'; return; }

            let html = '<table class="table"><thead><tr><th>Name</th><th>Email</th><th>Enrollment #</th><th>Course</th><th>Action</th></tr></thead><tbody>';
            students.forEach(student => {
                const courseName = student.course ? student.course.title : 'N/A';
                html += `<tr>
                    <td>${student.name}</td>
                    <td>${student.email}</td>
                    <td>${student.enrollment_number}</td>
                    <td>${courseName}</td>
                    <td><button class="btn-danger" onclick="deleteStudent(${student.id})">Delete</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        })
        .catch(err => container.innerHTML = '<div class="empty-state">Error loading students</div>');
    }

    function createStudent(event) {
        event.preventDefault();
        const data = {
            name: document.getElementById('student_name').value,
            email: document.getElementById('student_email').value,
            enrollment_number: document.getElementById('student_enroll').value,
            course_id: parseInt(document.getElementById('student_course').value)
        };
        fetch(`${API_BASE}/students/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(data => {
            document.getElementById('studentForm').reset();
            showAlert('studentAlert', 'Student added successfully!', 'success');
            loadStudents();
        })
        .catch(err => showAlert('studentAlert', 'Error adding student', 'error'));
    }

    function deleteStudent(id) {
        if (!confirm('کیا آپ اس طالب علم کو حذف کرنا چاہتے ہیں؟')) return;
        fetch(`${API_BASE}/students/${id}/`, { method: 'DELETE' })
        .then(() => { showAlert('studentAlert', 'طالب علم کامیابی سے حذف ہو گیا!', 'success'); loadStudents(); })
        .catch(() => showAlert('studentAlert', 'طالب علم حذف کرنے میں خرابی', 'error'));
    }

    window.addEventListener('load', () => {
        // Check URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const tabParam = urlParams.get('tab');
        
        if (tabParam === 'courses') {
            document.getElementById('courses').classList.add('active');
            document.querySelector('[onclick*="courses"]').classList.add('active');
            loadCourses();
        } else if (tabParam === 'students') {
            document.getElementById('students').classList.add('active');
            document.querySelector('[onclick*="students"]').classList.add('active');
            loadStudents();
        } else {
            loadInstructors();
        }
        
        loadCourses();
        loadStudents();
    });
</script>
</body>
</html>
